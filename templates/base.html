<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taskify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* ===== BACKGROUND ===== */
        .auth-page {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }

        .dashboard-page {
            background: #f1f5f9;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #0f172a;
            color: #cbd5e1;
            padding: 20px;
            z-index: 2000;
            transition: 0.3s;
        }

        .sidebar h5 {
            color: white;
            font-weight: 600;
        }

        /* ===== NAV ===== */
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .nav-link.active {
            background: linear-gradient(135deg,#6366f1,#4f46e5);
            color: white;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            height: 60px;
            position: fixed;
            top: 0;
            left: 240px;
            right: 0;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .topbar input {
            max-width: 400px;
            border-radius: 8px;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 240px;
            margin-top: 70px;
            padding: 25px;
        }

        /* ===== CARD ===== */
        .card {
            border-radius: 14px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* ===== BUTTON ===== */
        .btn-primary {
            background: linear-gradient(135deg,#6366f1,#4f46e5);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            .sidebar {
                left: -240px;
            }

            .sidebar.show {
                left: 0;
            }

            .topbar {
                left: 0;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>

</head>

<body class="{% if request.path in ['/login','/signup'] %}auth-page{% else %}dashboard-page{% endif %}">

{% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

    <h5 class="mb-4">🚀 Taskify</h5>

    {% if current_user.role == "admin" %}
      <a href="/admin" class="nav-link {% if request.path=='/admin' %}active{% endif %}">
        🏠 Dashboard
      </a>
    {% else %}
      <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">
        🏠 Dashboard
      </a>
    {% endif %}

    <a href="/projects" class="nav-link {% if request.path=='/projects' %}active{% endif %}">
        📁 Projects
    </a>

    <a href="/team" class="nav-link {% if request.path=='/team' %}active{% endif %}">
        👥 Team
    </a>

    <a href="/settings" class="nav-link {% if request.path=='/settings' %}active{% endif %}">
        ⚙ Settings
    </a>

    <hr class="border-secondary">

    <a href="/logout" class="btn btn-danger w-100 mt-2">
        Logout
    </a>

</div>

<!-- ===== TOPBAR ===== -->
<div class="topbar">

    <button class="btn btn-outline-secondary d-md-none" onclick="toggleSidebar()">
        ☰
    </button>

    <input class="form-control" placeholder="Search projects, tasks...">

    <span class="fw-semibold">{{ current_user.name }}</span>

</div>

{% endif %}

<!-- ===== CONTENT ===== -->
<div class="{% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}main{% endif %}">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script>
function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("show");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
